<!doctype html>
<html lang="ru">
    <script src="moz-extension://06aea23d-f251-4bbd-b5e3-539dedf14e6b/content/fido2-page-script.js"></script>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Countdown</title>

        <link rel="stylesheet" href="css/normalize.css" />
        <link rel="stylesheet" href="fonts/stylesheet.css" />
        <link rel="stylesheet" href="css/style.css" />

        <meta
            name="description"
            content="Отсчёт времени до различных ивентов"
        />

        <meta property="og:title" content="Countdown" />
        <meta property="og:type" content="article" />
        <meta property="og:url" content="https://timka.space/timers" />
        <meta property="og:image" content="" />
        <link rel="icon" href="/favicon.ico" sizes="any" />
        <link rel="icon" href="/icon.svg" type="image/svg+xml" />
        <link rel="apple-touch-icon" href="icon.png" />
        <meta name="theme-color" content="#fafafa" />
    </head>

    <body>
        <main>
            <div>
                <div class="title">
                    <div class="title-text" id="dateDescription">
                        Ой, что-то не прогрузилось... бывает!
                    </div>
                </div>
            </div>

            <div>
                <div class="image">
                    <span id="timer" class="">
                        <span id="days">-1</span>
                        <span id="daysDivider" class="divider"
                            ><span class="colon">:</span></span
                        >
                        <span id="hours">01</span>
                        <span id="hoursDivider" class="divider"
                            ><span class="colon">:</span></span
                        >
                        <span id="minutes">01</span>
                        <span id="minutesDivider" class="divider"
                            ><span class="colon">:</span></span
                        >
                        <span id="seconds">01</span>
                    </span>
                    <img src="img/bomb.png" alt="" class="bomb" />
                </div>
            </div>

            <div id="footer">
                <div>
                    Создано
                    <a href="https://t.me/nalinor" aria-label="автор"
                        >@nalinor</a
                    >
                    для
                    <a href="https://t.me/prod_hse" aria-label="откуда взял"
                        >@prod_hse</a
                    >, адаптировано для личных целей
                </div>
            </div>
        </main>

        <script src="js/app.js"></script>
    </body>
</html>
